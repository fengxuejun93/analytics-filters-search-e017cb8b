<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二手货品置换平台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <h1 class="logo" onclick="navigateTo('list')">🔄 二手置换平台</h1>
            <div class="header-right">
                <span class="header-url" id="header-url"></span>
                <button class="btn btn-primary" onclick="showCreateForm()">+ 发布货品</button>
            </div>
        </div>
    </header>

    <!-- 统计区域 -->
    <section class="stats-bar" id="stats-bar">
        <div class="stat-card stat-listed" onclick="filterByStat('listed')"><span class="stat-num" id="stat-listed">0</span><span class="stat-label">上架中</span></div>
        <div class="stat-card stat-pending" onclick="filterByStat('pending')"><span class="stat-num" id="stat-pending">0</span><span class="stat-label">待处理申请</span></div>
        <div class="stat-card stat-exchanged" onclick="filterByStat('exchanged')"><span class="stat-num" id="stat-exchanged">0</span><span class="stat-label">已达成置换</span></div>
        <div class="stat-card stat-delisted" onclick="filterByStat('delisted')"><span class="stat-num" id="stat-delisted">0</span><span class="stat-label">已下架</span></div>
        <div class="stat-card stat-rejected" onclick="filterByStat('rejected')"><span class="stat-num" id="stat-rejected">0</span><span class="stat-label">被拒绝申请</span></div>
        <div class="stat-card stat-cancelled" onclick="filterByStat('cancelled')"><span class="stat-num" id="stat-cancelled">0</span><span class="stat-label">已取消申请</span></div>
    </section>

    <!-- 列表视图 -->
    <main id="view-list" class="view active">
        <div class="filters">
            <input type="text" id="filter-keyword" placeholder="搜索关键词..." oninput="debounceLoadItems()">
            <select id="filter-category" onchange="loadItems()"><option value="">全部品类</option></select>
            <select id="filter-city" onchange="loadItems()"><option value="">全部城市</option></select>
            <select id="filter-condition" onchange="loadItems()"><option value="">全部成色</option></select>
            <select id="filter-status" onchange="loadItems()">
                <option value="">全部状态</option>
                <option value="listed">上架中</option>
                <option value="exchanged">已置换</option>
                <option value="delisted">已下架</option>
            </select>
            <select id="filter-app-status" onchange="loadItems()">
                <option value="">全部申请状态</option>
                <option value="pending">待处理</option>
                <option value="accepted">已接受</option>
                <option value="rejected">已拒绝</option>
                <option value="cancelled">已取消</option>
            </select>
            <button class="btn btn-secondary" onclick="clearFilters()">清除全部</button>
        </div>
        <div class="active-filters" id="active-filters" style="display:none;"></div>
        <div class="item-grid" id="item-grid"></div>
        <div class="result-count" id="result-count" style="display:none;"></div>
        <div class="empty-state" id="empty-state" style="display:none;">
            <p>暂无符合条件的货品</p>
            <button class="btn btn-secondary btn-sm" onclick="clearFilters()" style="margin-top:8px;">清除筛选，查看全部</button>
        </div>
    </main>

    <!-- 详情视图 -->
    <main id="view-detail" class="view">
        <div class="detail-nav">
            <button class="btn btn-back" onclick="navigateTo('list')">← 返回列表</button>
            <span class="detail-nav-item" id="detail-nav-item"></span>
        </div>
        <div class="detail-layout">
            <!-- 左栏：货品信息 -->
            <div class="detail-col-left">
                <div class="detail-card">
                    <div class="detail-image" id="detail-image">📷</div>
                    <div class="detail-info">
                        <h2 id="detail-title"></h2>
                        <div class="detail-meta" id="detail-meta"></div>
                        <div class="detail-field-grid" id="detail-fields"></div>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-section">
                        <h3>详细描述</h3>
                        <p id="detail-desc"></p>
                    </div>
                    <div class="detail-section">
                        <h3>交换条件</h3>
                        <p id="detail-exchange"></p>
                    </div>
                    <div class="detail-actions" id="detail-actions"></div>
                    <div class="detail-status-hint" id="detail-status-hint" style="display:none;"></div>
                </div>
            </div>
            <!-- 右栏：申请 + 状态历史 -->
            <div class="detail-col-right">
                <div class="detail-card">
                    <div class="detail-section">
                        <h3>置换申请 <span class="badge" id="detail-app-count">0</span> <button class="btn btn-sm btn-primary" onclick="showApplyForm()" id="btn-apply-toggle">发起申请</button></h3>
                        <div id="apply-form" class="apply-form" style="display:none;">
                            <input type="text" id="apply-applicant" placeholder="你的名字">
                            <input type="text" id="apply-offer-item" placeholder="你能提供的置换物（如：iPad Pro 2022）">
                            <textarea id="apply-message" placeholder="补充留言说明..." rows="2"></textarea>
                            <button class="btn btn-primary btn-sm" onclick="submitApplication()">提交申请</button>
                        </div>
                        <div id="application-list"></div>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-section">
                        <h3>状态历史</h3>
                        <div id="status-history"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 创建/编辑视图 -->
    <main id="view-form" class="view">
        <div class="detail-nav">
            <button class="btn btn-back" id="form-back-btn">← 返回</button>
        </div>
        <div class="form-container">
            <h2 id="form-title">发布新货品</h2>
            <form id="item-form" onsubmit="submitItemForm(event)">
                <input type="hidden" id="form-item-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>标题 *</label>
                        <input type="text" id="form-field-title" required>
                    </div>
                    <div class="form-group">
                        <label>品类 *</label>
                        <select id="form-field-category" required>
                            <option value="">请选择</option>
                            <option value="数码电子">数码电子</option>
                            <option value="家具家居">家具家居</option>
                            <option value="运动户外">运动户外</option>
                            <option value="图书文具">图书文具</option>
                            <option value="服装鞋包">服装鞋包</option>
                            <option value="母婴玩具">母婴玩具</option>
                            <option value="美妆个护">美妆个护</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>成色</label>
                        <select id="form-field-condition">
                            <option value="全新">全新</option>
                            <option value="九五新">九五新</option>
                            <option value="九成新">九成新</option>
                            <option value="八成新">八成新</option>
                            <option value="七成新">七成新</option>
                            <option value="五成新及以下">五成新及以下</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>所在城市 *</label>
                        <input type="text" id="form-field-city" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>期望置换物</label>
                        <input type="text" id="form-field-exchange">
                    </div>
                    <div class="form-group">
                        <label>发布人 *</label>
                        <input type="text" id="form-field-publisher" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>详细描述</label>
                    <textarea id="form-field-description" rows="4"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-secondary" id="form-cancel-btn">取消</button>
                </div>
            </form>
        </div>
    </main>

    <!-- 消息提示 -->
    <div id="toast" class="toast" style="display:none;"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
